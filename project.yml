name: VideoFrameCapture

options:
  bundleIdPrefix: com.videoframecapture
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "15"
  createIntermediateGroups: true
  defaultConfig: Debug

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    TARGETED_DEVICE_FAMILY: "1,2"
    SUPPORTS_MACCATALYST: YES
    DERIVE_MACCATALYST_PRODUCT_BUNDLE_IDENTIFIER: YES

targets:
  VideoFrameCapture:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: VideoFrameCapture
        excludes:
          - "**/*.plist"
    resources:
      - path: VideoFrameCapture/Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.videoframecapture.VideoFrameCapture
        INFOPLIST_FILE: VideoFrameCapture/Info.plist
        SUPPORTS_MACCATALYST: YES
        DERIVE_MACCATALYST_PRODUCT_BUNDLE_IDENTIFIER: YES
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
    info:
      path: VideoFrameCapture/Info.plist

schemes:
  VideoFrameCapture:
    build:
      targets:
        VideoFrameCapture: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
